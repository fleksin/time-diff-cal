kind = "web"
previewPath = "/"
title = "差时计算器"
version = "1.0.0"
id = "artifacts/time-diff-calc"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21753

[services.development]
run = "pnpm --filter @workspace/time-diff-calc run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/time-diff-calc", "run", "build" ]
publicDir = "artifacts/time-diff-calc/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21753"
BASE_PATH = "/"
