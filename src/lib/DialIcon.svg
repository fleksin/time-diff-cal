<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="dialGradient" cx="50%" cy="35%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#f0f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cbd5e1;stop-opacity:1" />
    </radialGradient>
    
    <radialGradient id="outerGradient" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#e2e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cbd5e1;stop-opacity:1" />
    </radialGradient>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(15,23,42,0.15)" />
    </filter>
  </defs>

  <!-- 外层圆形（立体感） -->
  <circle cx="120" cy="120" r="115" fill="url(#outerGradient)" />
  <circle cx="120" cy="120" r="115" fill="none" stroke="rgba(148,163,184,0.3)" stroke-width="1" />

  <!-- 内层拨盘 -->
  <circle cx="120" cy="120" r="105" fill="url(#dialGradient)" filter="url(#shadow)" />
  <circle cx="120" cy="120" r="105" fill="none" stroke="rgba(148,163,184,0.24)" stroke-width="0.5" />

  <!-- 刻度线 -->
  <g stroke="#0f172a" stroke-linecap="round">
    <!-- 24个刻度，每15度一个 -->
    <g id="ticks">
      <!-- 小刻度 -->
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" />
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" transform="rotate(15 120 120)" />
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" transform="rotate(30 120 120)" />
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" transform="rotate(45 120 120)" />
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" transform="rotate(60 120 120)" />
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" transform="rotate(75 120 120)" />
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" transform="rotate(90 120 120)" />
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" transform="rotate(105 120 120)" />
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" transform="rotate(120 120 120)" />
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" transform="rotate(135 120 120)" />
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" transform="rotate(150 120 120)" />
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" transform="rotate(165 120 120)" />
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" transform="rotate(180 120 120)" />
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" transform="rotate(195 120 120)" />
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" transform="rotate(210 120 120)" />
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" transform="rotate(225 120 120)" />
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" transform="rotate(240 120 120)" />
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" transform="rotate(255 120 120)" />
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" transform="rotate(270 120 120)" />
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" transform="rotate(285 120 120)" />
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" transform="rotate(300 120 120)" />
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" transform="rotate(315 120 120)" />
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" transform="rotate(330 120 120)" />
      <line x1="120" y1="15" x2="120" y2="28" stroke-width="1.2" opacity="0.4" transform="rotate(345 120 120)" />

      <!-- 大刻度（每90度） -->
      <line x1="120" y1="12" x2="120" y2="30" stroke-width="2" opacity="0.8" />
      <line x1="120" y1="12" x2="120" y2="30" stroke-width="2" opacity="0.8" transform="rotate(90 120 120)" />
      <line x1="120" y1="12" x2="120" y2="30" stroke-width="2" opacity="0.8" transform="rotate(180 120 120)" />
      <line x1="120" y1="12" x2="120" y2="30" stroke-width="2" opacity="0.8" transform="rotate(270 120 120)" />
    </g>
  </g>

  <!-- 中心圆圈 -->
  <circle cx="120" cy="120" r="26" fill="url(#dialGradient)" />
  <circle cx="120" cy="120" r="26" fill="none" stroke="rgba(148,163,184,0.24)" stroke-width="0.5" />

  <!-- 中心点 -->
  <circle cx="120" cy="120" r="5" fill="#ffffff" stroke="#2563eb" stroke-width="2.5" />
  <circle cx="120" cy="120" r="2" fill="#2563eb" />

  <!-- 高光效果 -->
  <ellipse cx="95" cy="95" rx="30" ry="30" fill="rgba(255,255,255,0.15)" />
</svg>
